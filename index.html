<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Motorcycle Spec Compare</title>
  <style>
    :root {
      --bg: #f5f5f7;
      --panel: rgba(255, 255, 255, .82);
      --panel-solid: #ffffff;
      --line: #d8d8de;
      --line-soft: #ececf1;
      --text: #1d1d1f;
      --muted: #6e6e73;
      --subtle: #86868b;
      --blue: #0071e3;
      --green: #188038;
      --red: #d70015;
      --shadow: 0 18px 48px rgba(0, 0, 0, .08);
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Segoe UI", "Microsoft YaHei", Arial, sans-serif;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      color: var(--text);
      background: radial-gradient(circle at 20% 0%, #ffffff 0, transparent 340px), var(--bg);
      letter-spacing: 0;
    }

    button, input, select { font: inherit; }
    button { cursor: pointer; }
    button:disabled {
      cursor: not-allowed;
      opacity: .55;
    }

    .app {
      width: min(1480px, calc(100vw - 32px));
      margin: 0 auto;
      padding: 26px 0 34px;
    }

    .topbar {
      display: grid;
      grid-template-columns: minmax(260px, 1fr) auto;
      gap: 18px;
      align-items: center;
      padding: 20px 0 22px;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 14px;
      min-width: 0;
    }

    .mark {
      width: 48px;
      height: 48px;
      display: grid;
      place-items: center;
      color: var(--blue);
      border: 1px solid var(--line-soft);
      background: rgba(255,255,255,.88);
      border-radius: 14px;
      box-shadow: 0 8px 28px rgba(0,0,0,.08);
      flex: 0 0 auto;
    }

    h1 {
      margin: 0;
      font-size: clamp(25px, 3vw, 38px);
      line-height: 1.04;
      font-weight: 720;
      letter-spacing: 0;
    }

    .brand p {
      margin: 7px 0 0;
      color: var(--muted);
      font-size: 14px;
    }

    .status-strip {
      display: grid;
      grid-template-columns: repeat(3, 116px);
      gap: 10px;
    }

    .metric {
      min-height: 62px;
      padding: 10px 12px;
      border: 1px solid var(--line-soft);
      background: var(--panel);
      backdrop-filter: blur(18px);
      border-radius: 14px;
    }

    .metric span {
      display: block;
      color: var(--subtle);
      font-size: 12px;
    }

    .metric strong {
      display: block;
      margin-top: 4px;
      font-size: 22px;
      line-height: 1;
    }

    .toolbar {
      display: grid;
      grid-template-columns: .72fr .82fr .62fr .62fr auto;
      gap: 10px;
      margin: 8px 0 16px;
      align-items: center;
    }

    .field, .select, .mini-input, .ghost-button, .primary-button, .icon-button {
      min-height: 42px;
      border-radius: 12px;
      border: 1px solid var(--line);
      background: rgba(255,255,255,.9);
      color: var(--text);
      outline: none;
    }

    .field, .select, .mini-input {
      width: 100%;
      padding: 0 13px;
    }

    .mini-input {
      min-height: 38px;
      padding: 8px 11px;
    }

    .field::placeholder, .mini-input::placeholder { color: var(--subtle); }

    .field:focus, .select:focus, .mini-input:focus {
      border-color: rgba(0, 113, 227, .72);
      box-shadow: 0 0 0 4px rgba(0, 113, 227, .12);
    }

    .actions {
      display: flex;
      justify-content: flex-end;
      gap: 8px;
    }

    .ghost-button, .primary-button, .icon-button {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 0 14px;
      white-space: nowrap;
    }

    .ghost-button {
      color: var(--text);
      background: rgba(255,255,255,.72);
    }

    .primary-button {
      border-color: var(--blue);
      background: var(--blue);
      color: #fff;
    }

    .layout {
      display: grid;
      grid-template-columns: minmax(0, 1fr) 390px;
      gap: 16px;
      align-items: start;
    }

    .buyer-panel {
      border: 1px solid var(--line-soft);
      background: var(--panel);
      backdrop-filter: blur(20px);
      border-radius: 18px;
      box-shadow: var(--shadow);
      padding: 16px;
      margin-bottom: 16px;
    }

    .lookup-panel {
      margin-bottom: 16px;
    }

    .bike-cards {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 12px;
    }

    .bike-card {
      display: grid;
      gap: 12px;
      padding: 14px;
      border: 1px solid var(--line-soft);
      border-radius: 18px;
      background: rgba(255,255,255,.82);
    }

    .bike-card-top {
      display: grid;
      grid-template-columns: 76px 1fr;
      gap: 12px;
      align-items: center;
      min-width: 0;
    }

    .bike-card-title {
      min-width: 0;
    }

    .bike-card-title strong {
      display: block;
      font-size: 16px;
      line-height: 1.2;
      color: var(--text);
    }

    .bike-card-title span {
      display: block;
      margin-top: 5px;
      color: var(--muted);
      font-size: 12px;
    }

    .bike-price {
      color: var(--blue);
      font-size: 18px;
      font-weight: 730;
      font-variant-numeric: tabular-nums;
    }

    .price-note {
      color: var(--subtle);
      font-size: 12px;
      line-height: 1.35;
    }

    .review-line {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.35;
    }

    .review-link {
      color: var(--blue);
      font-size: 12px;
      font-weight: 650;
      text-decoration: none;
      white-space: nowrap;
    }

    .review-link:hover {
      text-decoration: underline;
    }

    .spec-pills {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 6px;
    }

    .spec-pill {
      min-height: 46px;
      padding: 7px 8px;
      border-radius: 12px;
      background: #f5f5f7;
      color: var(--text);
      font-size: 12px;
      font-variant-numeric: tabular-nums;
    }

    .spec-pill span {
      display: block;
      color: var(--subtle);
      font-size: 11px;
      margin-bottom: 3px;
    }

    .card-actions {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 8px;
      align-items: center;
    }

    .details-panel {
      margin-bottom: 16px;
    }

    .apple-compare-panel {
      border: 1px solid var(--line-soft);
      background: rgba(255,255,255,.88);
      border-radius: 24px;
      box-shadow: var(--shadow);
      padding: clamp(18px, 3vw, 34px);
      margin-bottom: 16px;
    }

    .compare-selectors {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 16px;
      margin: 18px 0 26px;
    }

    .compare-picker {
      display: grid;
      gap: 10px;
      padding: 12px;
      border: 1px solid var(--line-soft);
      border-radius: 16px;
      background: rgba(255,255,255,.72);
    }

    .compare-picker-title {
      color: var(--muted);
      font-size: 13px;
      font-weight: 650;
    }

    .compare-picker-results {
      display: grid;
      gap: 8px;
      max-height: 190px;
      overflow: auto;
    }

    .compare-result {
      display: grid;
      gap: 3px;
      width: 100%;
      padding: 10px 12px;
      text-align: left;
      border: 1px solid var(--line-soft);
      border-radius: 12px;
      background: #fff;
      color: var(--text);
    }

    .compare-result.active {
      border-color: rgba(0, 113, 227, .5);
      background: #f0f7ff;
    }

    .compare-result strong {
      font-size: 13px;
      line-height: 1.25;
    }

    .compare-result span {
      color: var(--muted);
      font-size: 12px;
    }

    .compare-device {
      display: grid;
      justify-items: center;
      text-align: center;
      gap: 10px;
      min-width: 0;
    }

    .compare-device .bike-photo,
    .compare-device .photo-fallback {
      width: 108px;
      height: 78px;
      border-radius: 18px;
      font-size: 28px;
    }

    .compare-device h3 {
      margin: 4px 0 0;
      font-size: clamp(18px, 2vw, 24px);
      line-height: 1.16;
      font-weight: 720;
    }

    .compare-device .bike-price {
      font-size: 17px;
    }

    .apple-summary {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 0;
      border-top: 1px solid var(--line-soft);
      border-bottom: 1px solid var(--line-soft);
      margin-top: 12px;
    }

    .summary-cell {
      display: grid;
      justify-items: center;
      gap: 8px;
      padding: clamp(22px, 4vw, 46px) 16px;
      text-align: center;
    }

    .summary-cell + .summary-cell {
      border-left: 1px solid var(--line-soft);
    }

    .summary-number {
      font-size: clamp(52px, 8vw, 82px);
      line-height: .95;
      font-weight: 760;
      letter-spacing: 0;
      color: var(--text);
      font-variant-numeric: tabular-nums;
    }

    .summary-label {
      color: var(--muted);
      font-size: 14px;
      line-height: 1.35;
    }

    .compare-specs {
      display: grid;
      margin-top: 24px;
      border-top: 1px solid var(--line-soft);
    }

    .compare-row {
      display: grid;
      grid-template-columns: 160px repeat(2, minmax(0, 1fr));
      gap: 16px;
      align-items: center;
      min-height: 72px;
      padding: 16px 0;
      border-bottom: 1px solid var(--line-soft);
    }

    .compare-row-label {
      color: var(--muted);
      font-size: 13px;
      font-weight: 650;
    }

    .compare-row-value {
      text-align: center;
      color: var(--text);
      font-size: 18px;
      font-weight: 680;
      line-height: 1.28;
      font-variant-numeric: tabular-nums;
    }

    .compare-row-value small {
      display: block;
      margin-top: 5px;
      color: var(--muted);
      font-size: 12px;
      font-weight: 500;
    }

    .compare-shell, .side-section {
      border: 1px solid var(--line-soft);
      background: var(--panel);
      backdrop-filter: blur(20px);
      border-radius: 18px;
      box-shadow: var(--shadow);
      overflow: hidden;
    }

    .side {
      position: sticky;
      top: 16px;
      display: grid;
      gap: 14px;
    }

    .side-section {
      padding: 16px;
    }

    .side-section.hidden {
      display: none;
    }

    .table-wrap {
      overflow: auto;
      max-height: calc(100vh - 188px);
    }

    table {
      width: 100%;
      min-width: 1360px;
      border-collapse: collapse;
    }

    th, td {
      padding: 12px 14px;
      border-bottom: 1px solid var(--line-soft);
      text-align: left;
      vertical-align: top;
    }

    th {
      position: sticky;
      top: 0;
      z-index: 3;
      background: rgba(250,250,252,.96);
      color: var(--muted);
      font-size: 12px;
      font-weight: 650;
    }

    th:first-child, td:first-child {
      position: sticky;
      left: 0;
      z-index: 2;
      background: rgba(255,255,255,.96);
      min-width: 292px;
      max-width: 330px;
    }

    th:first-child { z-index: 4; }

    .check-cell {
      display: grid;
      grid-template-columns: 18px 72px 1fr;
      gap: 10px;
      align-items: center;
    }

    .check-cell input {
      width: 18px;
      height: 18px;
      accent-color: var(--blue);
    }

    .bike-photo, .photo-fallback {
      width: 72px;
      height: 52px;
      border-radius: 12px;
      border: 1px solid var(--line-soft);
      background: #f2f2f4;
    }

    .bike-photo {
      object-fit: cover;
      display: block;
    }

    .photo-fallback {
      display: grid;
      place-items: center;
      color: var(--blue);
      font-size: 18px;
      font-weight: 760;
    }

    .bike-name {
      display: flex;
      flex-direction: column;
      gap: 6px;
      min-width: 0;
    }

    .bike-name strong {
      color: var(--text);
      font-size: 15px;
      line-height: 1.25;
    }

    .bike-name span, .hint {
      color: var(--subtle);
      font-size: 12px;
    }

    .value, .best {
      color: var(--text);
      font-variant-numeric: tabular-nums;
    }

    .best {
      color: var(--green);
      font-weight: 720;
    }

    .low { color: var(--red); }

    .tag {
      display: inline-flex;
      align-items: center;
      min-height: 24px;
      padding: 3px 8px;
      border-radius: 999px;
      border: 1px solid #d6e8ff;
      color: #0057b8;
      background: #f0f7ff;
      font-size: 12px;
    }

    .pros-cons {
      min-width: 220px;
      display: grid;
      gap: 6px;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.38;
    }

    .pros-cons b {
      color: var(--text);
      font-weight: 650;
    }

    .section-title {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 10px;
      margin-bottom: 12px;
    }

    .section-title h2 {
      margin: 0;
      font-size: 15px;
      color: var(--text);
    }

    .form-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }

    .form-grid .wide { grid-column: 1 / -1; }

    input[type="file"].mini-input {
      color: var(--muted);
      padding: 7px 10px;
    }

    .photo-preview {
      width: 100%;
      height: 132px;
      object-fit: cover;
      border-radius: 14px;
      border: 1px solid var(--line-soft);
      background: #f2f2f4;
      display: none;
    }

    .compare-list, .lookup-list, .oil-list {
      display: grid;
      gap: 8px;
      max-height: 246px;
      overflow: auto;
      padding-right: 2px;
    }

    .compare-item, .lookup-item, .oil-card {
      display: grid;
      gap: 7px;
      padding: 10px;
      border: 1px solid var(--line-soft);
      border-radius: 14px;
      background: rgba(255,255,255,.72);
    }

    .compare-item {
      grid-template-columns: 54px 1fr auto;
      align-items: center;
      min-height: 58px;
    }

    .lookup-item {
      grid-template-columns: 1fr auto;
      align-items: center;
    }

    .compare-item img, .compare-thumb {
      width: 54px;
      height: 40px;
      object-fit: cover;
      border-radius: 10px;
      border: 1px solid var(--line-soft);
      background: #f2f2f4;
    }

    .compare-thumb {
      display: grid;
      place-items: center;
      color: var(--blue);
      font-weight: 760;
    }

    .compare-item strong, .lookup-item strong, .oil-card strong {
      font-size: 13px;
      color: var(--text);
      line-height: 1.3;
    }

    .compare-item span, .lookup-item span, .oil-reason {
      display: block;
      margin-top: 3px;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.42;
    }

    .oil-card header {
      display: flex;
      justify-content: space-between;
      gap: 10px;
      align-items: start;
    }

    .oil-price {
      color: var(--green);
      font-weight: 720;
      white-space: nowrap;
      font-variant-numeric: tabular-nums;
    }

    .oil-meta {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
    }

    .icon {
      width: 18px;
      height: 18px;
      stroke: currentColor;
      stroke-width: 2;
      fill: none;
      stroke-linecap: round;
      stroke-linejoin: round;
      flex: 0 0 auto;
    }

    .icon-button {
      width: 36px;
      height: 36px;
      padding: 0;
    }

    .empty {
      min-height: 88px;
      display: grid;
      place-items: center;
      color: var(--subtle);
      text-align: center;
      border: 1px dashed var(--line);
      border-radius: 14px;
      padding: 14px;
      font-size: 13px;
    }

    .toast {
      position: fixed;
      right: 18px;
      bottom: 18px;
      transform: translateY(18px);
      opacity: 0;
      pointer-events: none;
      transition: .22s ease;
      padding: 10px 14px;
      border: 1px solid var(--line-soft);
      border-radius: 14px;
      background: rgba(255,255,255,.94);
      color: var(--text);
      box-shadow: var(--shadow);
    }

    .toast.show {
      transform: translateY(0);
      opacity: 1;
    }

    @media (max-width: 1120px) {
      .layout { grid-template-columns: 1fr; }
      .side { position: static; }
      .table-wrap { max-height: none; }
      .bike-cards { grid-template-columns: repeat(2, minmax(0, 1fr)); }
      .compare-row { grid-template-columns: 120px repeat(2, minmax(0, 1fr)); }
    }

    @media (max-width: 760px) {
      .app {
        width: min(100% - 20px, 1480px);
        padding-top: 12px;
      }

      .topbar, .toolbar { grid-template-columns: 1fr; }
      .status-strip { grid-template-columns: repeat(3, 1fr); }
      .actions { justify-content: stretch; flex-wrap: wrap; }
      .actions > * { flex: 1; }
      .form-grid { grid-template-columns: 1fr; }
      .bike-cards { grid-template-columns: 1fr; }
      .spec-pills { grid-template-columns: repeat(3, minmax(0, 1fr)); }
      .compare-selectors,
      .apple-summary {
        grid-template-columns: 1fr;
      }
      .summary-cell + .summary-cell {
        border-left: 0;
        border-top: 1px solid var(--line-soft);
      }
      .compare-row {
        grid-template-columns: 1fr;
        gap: 10px;
      }
      .compare-row-value {
        text-align: left;
      }
    }
  </style>
</head>
<body>
  <main class="app">
    <header class="topbar">
      <div class="brand">
        <div class="mark" aria-hidden="true">
          <svg class="icon" viewBox="0 0 24 24">
            <path d="M5 18a3 3 0 1 0 0-6 3 3 0 0 0 0 6Z"></path>
            <path d="M19 18a3 3 0 1 0 0-6 3 3 0 0 0 0 6Z"></path>
            <path d="M8 15h3l3-6h2l3 6"></path>
            <path d="M11 15 8 9H5"></path>
          </svg>
        </div>
        <div>
          <h1 data-i18n="title">摩托车配置对比</h1>
          <p data-i18n="subtitle">查找车型，一键加入完整参数，以 RM 预算做对比。</p>
        </div>
      </div>
      <div class="status-strip">
        <div class="metric"><span data-i18n="library">车型库</span><strong id="totalCount">0</strong></div>
        <div class="metric"><span data-i18n="filtered">已筛选</span><strong id="shownCount">0</strong></div>
        <div class="metric"><span data-i18n="selected">对比中</span><strong id="selectedCount">0</strong></div>
      </div>
    </header>

    <section class="toolbar" aria-label="Filter toolbar">
      <select id="typeFilter" class="select" aria-label="Bike type"></select>
      <select id="sortSelect" class="select" aria-label="Sort"></select>
      <input id="minPriceInput" class="field" type="number" min="0" step="100" data-i18n-placeholder="minPrice" />
      <input id="maxPriceInput" class="field" type="number" min="0" step="100" data-i18n-placeholder="maxPrice" />
      <div class="actions">
        <select id="langSelect" class="select" aria-label="Language">
          <option value="zh">中文</option>
          <option value="en">English</option>
        </select>
        <button id="resetBtn" class="ghost-button" type="button" data-i18n-title="reset">
          <svg class="icon" viewBox="0 0 24 24"><path d="M3 12a9 9 0 1 0 3-6.7"></path><path d="M3 3v6h6"></path></svg>
          <span data-i18n="reset">重置</span>
        </button>
        <button id="exportBtn" class="primary-button" type="button" data-i18n-title="export">
          <svg class="icon" viewBox="0 0 24 24"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><path d="M7 10l5 5 5-5"></path><path d="M12 15V3"></path></svg>
          <span data-i18n="export">导出</span>
        </button>
      </div>
    </section>

    <section class="buyer-panel lookup-panel">
      <div class="section-title">
        <h2 data-i18n="lookupTitle">车型查找</h2>
      </div>
      <div class="form-grid">
        <input id="lookupInput" class="mini-input wide" type="search" data-i18n-placeholder="lookupPlaceholder" />
      </div>
      <div id="lookupList" class="lookup-list"></div>
    </section>

    <section class="buyer-panel">
      <div class="section-title">
        <h2 data-i18n="featuredTitle">推荐车型</h2>
      </div>
      <div id="bikeCards" class="bike-cards"></div>
    </section>

    <section class="apple-compare-panel">
      <div class="section-title">
        <h2 data-i18n="twoCompareTitle">双车对比</h2>
      </div>
      <div class="compare-selectors">
        <div class="compare-picker">
          <div class="compare-picker-title" data-i18n="selectFirstBike">选择第一台摩托车</div>
          <select id="compareBrandA" class="select" aria-label="First motorcycle brand"></select>
          <input id="compareSearchA" class="mini-input" type="search" data-i18n-placeholder="compareSearchPlaceholder" />
          <div id="compareResultsA" class="compare-picker-results"></div>
        </div>
        <div class="compare-picker">
          <div class="compare-picker-title" data-i18n="selectSecondBike">选择第二台摩托车</div>
          <select id="compareBrandB" class="select" aria-label="Second motorcycle brand"></select>

      lookupList: document.getElementById("lookupList"),
      manualSection: document.getElementById("manualSection")
    };

    function t(key) { return i18n[state.lang][key]; }

    function money(value) {
      return `RM ${Number(value).toLocaleString("en-MY", { maximumFractionDigits: 0 })}`;
    }

    function photoMarkup(bike, className = "bike-photo") {
      if (bike.photo) return `<img class="${className}" src="${bike.photo}" alt="${bike.brand} ${bike.name}" onerror="this.replaceWith(fallbackPhoto(this.alt))" />`;
      const initial = (bike.brand || bike.name || "?").trim().charAt(0).toUpperCase();
      return `<span class="${className === "bike-photo" ? "photo-fallback" : "compare-thumb"}">${initial}</span>`;
    }

    function fallbackPhoto(text) {
      const span = document.createElement("span");
      span.className = "photo-fallback";
      span.textContent = (text || "?").trim().charAt(0).toUpperCase();
      return span;
    }

    function typeName(type) { return typeLabels[type]?.[state.lang] || type; }

    function buildProsCons(bike) {
      const pros = [];
      const cons = [];
      const item = (zh, en) => ({ zh, en });
      if (bike.type === "scooter") {
        pros.push(item("\u57ce\u5e02\u901a\u52e4\u4fbf\u5229", "Easy for city commuting"), item("\u50a8\u7269\u4e0e\u4f4e\u901f\u9a91\u884c\u53cb\u597d", "Practical storage and low-speed usability"));
        cons.push(item("\u9ad8\u901f\u7a33\u5b9a\u6027\u548c\u957f\u9014\u8212\u9002\u6027\u6709\u9650", "Limited highway stability and long-distance comfort"));
      } else if (bike.type === "sport") {
        pros.push(item("\u64cd\u63a7\u76f4\u63a5", "Sharp handling"), item("\u52a8\u529b\u54cd\u5e94\u79ef\u6781", "Responsive power delivery"));
        cons.push(item("\u9a91\u59ff\u8f83\u6218\u6597\uff0c\u65e5\u5e38\u8212\u9002\u6027\u4e00\u822c", "Aggressive riding posture, less comfortable daily"));
      } else if (bike.type === "adv") {
        pros.push(item("\u957f\u9014\u548c\u70c2\u8def\u9002\u5e94\u6027\u5f3a", "Strong for touring and rough roads"), item("\u6cb9\u7bb1\u548c\u5750\u59ff\u66f4\u9002\u5408\u65c5\u884c", "Fuel tank and ergonomics suit travel"));
        cons.push(item("\u8f66\u8eab\u504f\u9ad8\u504f\u91cd\uff0c\u65b0\u624b\u9700\u8981\u9002\u5e94", "Tall and heavy, beginners may need time to adapt"));
      } else if (bike.type === "cruiser") {
        pros.push(item("\u4f4e\u5ea7\u9ad8\u66f4\u6613\u843d\u811a", "Low seat height is easy to manage"), item("\u4f4e\u626d\u548c\u5de1\u822a\u6c1b\u56f4\u597d", "Good low-end torque and cruising character"));
        cons.push(item("\u5f2f\u9053\u7075\u6d3b\u6027\u548c\u901a\u8fc7\u6027\u8f83\u5f31", "Less agile in corners and limited clearance"));
      } else {
        pros.push(item("\u65e5\u5e38\u4e0e\u5468\u672b\u9a91\u884c\u5e73\u8861\u597d", "Good balance for daily and weekend riding"), item("\u7ef4\u62a4\u548c\u6539\u88c5\u9009\u62e9\u8f83\u591a", "Good maintenance and modification options"));
        cons.push(item("\u98ce\u963b\u4fdd\u62a4\u8f83\u5c11\uff0c\u957f\u9014\u9700\u52a0\u88c5\u914d\u4ef6", "Limited wind protection for long rides"));
      }

      if (bike.cc <= 160) pros.push(item("\u6cb9\u8017\u4f4e\uff0c\u517b\u8f66\u6210\u672c\u53cb\u597d", "Low fuel use and affordable ownership"));
      if (bike.cc >= 650) pros.push(item("\u9ad8\u901f\u8d85\u8f66\u548c\u53cc\u8f7d\u4f59\u91cf\u66f4\u8db3", "More reserve for highway overtakes and two-up riding"));
      if (bike.weight >= 220) cons.push(item("\u4f4e\u901f\u632a\u8f66\u538b\u529b\u8f83\u5927", "Heavy to move around at low speed"));
      if (bike.seat >= 835) cons.push(item("\u5ea7\u9ad8\u8f83\u9ad8\uff0c\u5bf9\u8eab\u9ad8\u6709\u8981\u6c42", "Tall seat height may not suit all riders"));
      if (bike.tank >= 17) pros.push(item("\u7eed\u822a\u8868\u73b0\u66f4\u5b89\u5fc3", "Better range confidence"));
      if (bike.price >= 60000) cons.push(item("\u5165\u624b\u548c\u4fdd\u9669\u6210\u672c\u8f83\u9ad8", "Higher purchase and insurance cost"));
      if (bike.price <= 18000) pros.push(item("\u5165\u95e8\u9884\u7b97\u538b\u529b\u8f83\u5c0f", "Lower entry budget pressure"));

      return {
        pros: uniqueLocalized(pros).slice(0, 3),
        cons: uniqueLocalized(cons).slice(0, 3)
      };
    }

    function uniqueLocalized(items) {
      const seen = new Set();
      return items.filter((entry) => {
        const key = typeof entry === "string" ? entry : `${entry.zh}|${entry.en}`;
        if (seen.has(key)) return false;
        seen.add(key);
        return true;
      });
    }

    function prosConsText(bike) {
      const detail = bike.pros && bike.cons ? bike : buildProsCons(bike);
      const localize = (entry) => {
        if (typeof entry === "string") return state.lang === "en" ? translateLegacyProsCons(entry) : entry;
        return entry[state.lang] || entry.zh || entry.en || "";
      };
      return {
        pros: (detail.pros || []).map(localize),
        cons: (detail.cons || []).map(localize)
      };
    }

    function translateLegacyProsCons(text) {
      const map = {
        "\u57ce\u5e02\u901a\u52e4\u4fbf\u5229": "Easy for city commuting",
        "\u50a8\u7269\u4e0e\u4f4e\u901f\u9a91\u884c\u53cb\u597d": "Practical storage and low-speed usability",
        "\u9ad8\u901f\u7a33\u5b9a\u6027\u548c\u957f\u9014\u8212\u9002\u6027\u6709\u9650": "Limited highway stability and long-distance comfort",
        "\u64cd\u63a7\u76f4\u63a5": "Sharp handling",
        "\u52a8\u529b\u54cd\u5e94\u79ef\u6781": "Responsive power delivery",
        "\u9a91\u59ff\u8f83\u6218\u6597\uff0c\u65e5\u5e38\u8212\u9002\u6027\u4e00\u822c": "Aggressive riding posture, less comfortable daily",
        "\u957f\u9014\u548c\u70c2\u8def\u9002\u5e94\u6027\u5f3a": "Strong for touring and rough roads",
        "\u6cb9\u7bb1\u548c\u5750\u59ff\u66f4\u9002\u5408\u65c5\u884c": "Fuel tank and ergonomics suit travel",
        "\u8f66\u8eab\u504f\u9ad8\u504f\u91cd\uff0c\u65b0\u624b\u9700\u8981\u9002\u5e94": "Tall and heavy, beginners may need time to adapt",
        "\u4f4e\u5ea7\u9ad8\u66f4\u6613\u843d\u811a": "Low seat height is easy to manage",
        "\u4f4e\u626d\u548c\u5de1\u822a\u6c1b\u56f4\u597d": "Good low-end torque and cruising character",
        "\u5f2f\u9053\u7075\u6d3b\u6027\u548c\u901a\u8fc7\u6027\u8f83\u5f31": "Less agile in corners and limited clearance",
        "\u65e5\u5e38\u4e0e\u5468\u672b\u9a91\u884c\u5e73\u8861\u597d": "Good balance for daily and weekend riding",
        "\u7ef4\u62a4\u548c\u6539\u88c5\u9009\u62e9\u8f83\u591a": "Good maintenance and modification options",
        "\u98ce\u963b\u4fdd\u62a4\u8f83\u5c11\uff0c\u957f\u9014\u9700\u52a0\u88c5\u914d\u4ef6": "Limited wind protection for long rides",
        "\u6cb9\u8017\u4f4e\uff0c\u517b\u8f66\u6210\u672c\u53cb\u597d": "Low fuel use and affordable ownership",
        "\u9ad8\u901f\u8d85\u8f66\u548c\u53cc\u8f7d\u4f59\u91cf\u66f4\u8db3": "More reserve for highway overtakes and two-up riding",
        "\u4f4e\u901f\u632a\u8f66\u538b\u529b\u8f83\u5927": "Heavy to move around at low speed",
        "\u5ea7\u9ad8\u8f83\u9ad8\uff0c\u5bf9\u8eab\u9ad8\u6709\u8981\u6c42": "Tall seat height may not suit all riders",
        "\u7eed\u822a\u8868\u73b0\u66f4\u5b89\u5fc3": "Better range confidence",
        "\u5165\u624b\u548c\u4fdd\u9669\u6210\u672c\u8f83\u9ad8": "Higher purchase and insurance cost",
        "\u5165\u95e8\u9884\u7b97\u538b\u529b\u8f83\u5c0f": "Lower entry budget pressure"
      };
      return map[text] || text;
    }

    function priceStatusText(bike) {
      if (bike.priceVerified) return t("verifiedPrice");
      if (bike.priceStatus && bike.priceStatus.includes("No public")) return t("noPublicPrice");
      return t("estimatedPrice");
    }

    function escapeAttr(value) {
      return String(value || "").replaceAll("&", "&amp;").replaceAll('"', "&quot;").replaceAll("<", "&lt;").replaceAll(">", "&gt;");
    }

    function reviewText(bike) {
      const count = Number(bike.reviewCount || 0);
      return count ? `${count} ${t("reviewCountLabel")}` : t("reviewOpen");
    }

    function reviewLinkMarkup(bike) {
      if (!bike.reviewUrl) return `<span class="price-note">${t("noReview")}</span>`;
      const title = escapeAttr(bike.reviewTitle || `${bike.brand} ${bike.name}`);
      return `<a class="review-link" href="${escapeAttr(bike.reviewUrl)}" target="_blank" rel="noopener" title="${title}">${reviewText(bike)}</a>`;
    }

    function reviewLineMarkup(bike) {
      return `<span class="review-line"><b>${t("reviewLabel")}:</b> ${reviewLinkMarkup(bike)}</span>`;
    }

    function scoreBike(bike) {
      const values = normalize(bike);
      return Math.round((values.power + values.torque + values.range + values.price + values.weight) / 5);
    }

    function normalize(bike) {
      const ranges = getRanges(state.bikes.length ? state.bikes : catalogBikes);
      return {
        price: scale(bike.price, ranges.price, true),
        power: scale(bike.power, ranges.power),
        torque: scale(bike.torque, ranges.torque),
        weight: scale(bike.weight, ranges.weight, true),
        range: scale(bike.range, ranges.range)
      };
    }

    function scale(value, range, invert = false) {
      if (range.max === range.min) return 70;
      const raw = ((value - range.min) / (range.max - range.min)) * 100;
      return invert ? 100 - raw : raw;
    }

    function getRanges(bikes) {
      return ["price", "power", "torque", "weight", "range"].reduce((acc, key) => {
        const values = bikes.map((bike) => bike[key]);
        acc[key] = { min: Math.min(...values), max: Math.max(...values) };
        return acc;
      }, {});
    }

    function filteredBikes() {
      let result = state.bikes.filter((bike) => {
        const matchesType = state.type === "all" || bike.type === state.type;
        return matchesType && withinPriceRange(bike);
      });

      return sortBikes(result);
    }

    function browsableCatalogBikes() {
      return sortBikes(catalogBikes.filter((bike) => {
        const matchesType = state.type === "all" || bike.type === state.type;
        return matchesType && withinPriceRange(bike);
      }));
    }

    function sortBikes(result) {
      return result.sort((a, b) => {
        if (state.sort === "price-asc") return a.price - b.price;
        if (state.sort === "power-desc") return b.power - a.power;
        if (state.sort === "weight-asc") return a.weight - b.weight;
        if (state.sort === "range-desc") return b.range - a.range;
        return scoreBike(b) - scoreBike(a);
      });
    }

    function withinPriceRange(bike) {
      const min = Number(state.minPrice || 0);
      const max = Number(state.maxPrice || 0);
      return (!min || bike.price >= min) && (!max || bike.price <= max);
    }

    function localCatalogMatches() {
      const term = state.lookup.trim().toLowerCase();
      if (!term) return [];
      return catalogBikes.filter((bike) => {
        const haystack = `${bike.brand} ${bike.name} ${typeName(bike.type)} ${bike.cc} ${bike.electronics}`.toLowerCase();
        return haystack.includes(term) && withinPriceRange(bike);
      }).slice(0, 8);
    }

    function normalizeOnlineBike(raw, index) {
      const brand = raw.brand || raw.make || raw.manufacturer || "";
      const name = raw.name || raw.model || raw.modelName || "";
      const bike = {
        id: `online-${index}`,
        brand: String(brand).trim(),
        name: String(name).trim(),
        type: normalizeType(raw.type || raw.category || raw.segment),
        price: Number(raw.price ?? raw.priceRM ?? raw.price_rm ?? raw.msrp ?? 0),
        cc: Number(raw.cc ?? raw.displacement ?? raw.engine_cc ?? 0),
        power: Number(raw.power ?? raw.powerKw ?? raw.power_kw ?? 0),
        torque: Number(raw.torque ?? raw.torqueNm ?? raw.torque_nm ?? 0),
        weight: Number(raw.weight ?? raw.weightKg ?? raw.weight_kg ?? 0),
        seat: Number(raw.seat ?? raw.seatHeight ?? raw.seat_height_mm ?? 0),
        tank: Number(raw.tank ?? raw.fuelTank ?? raw.fuel_tank_l ?? 0),
        range: Number(raw.range ?? raw.rangeKm ?? raw.range_km ?? 0),
        electronics: raw.electronics || raw.features || raw.safety || "ABS",
        photo: raw.photo || raw.image || raw.imageUrl || raw.image_url || "",
        source: raw.source || raw.url || t("onlineSource")
      };
      return {
        ...bike,
        pros: Array.isArray(raw.pros) ? raw.pros : buildProsCons(bike).pros,
        cons: Array.isArray(raw.cons) ? raw.cons : buildProsCons(bike).cons
      };
    }

    function normalizeType(value) {
      const text = String(value || "").toLowerCase();
      if (text.includes("sport") || text.includes("race") || text.includes("supersport") || text.includes("仿")) return "sport";
      if (text.includes("adv") || text.includes("adventure") || text.includes("dual")) return "adv";
      if (text.includes("cruiser") || text.includes("rebel") || text.includes("巡")) return "cruiser";
      if (text.includes("scooter") || text.includes("踏")) return "scooter";
      return "naked";
    }

    function hasCompleteSpecs(bike) {
      return Boolean(
        bike.brand && bike.name && bike.type && bike.price && bike.cc && bike.power &&
        bike.torque && bike.weight && bike.seat && bike.tank && bike.range && bike.electronics
      );
    }

    function applyLanguage() {
      document.documentElement.lang = state.lang === "zh" ? "zh-CN" : "en";
      document.querySelectorAll("[data-i18n]").forEach((node) => node.textContent = t(node.dataset.i18n));
      document.querySelectorAll("[data-i18n-placeholder]").forEach((node) => node.placeholder = t(node.dataset.i18nPlaceholder));
      document.querySelectorAll("[data-i18n-title]").forEach((node) => node.title = t(node.dataset.i18nTitle));
      els.lang.value = state.lang;
      els.minPrice.value = state.minPrice || "";
      els.maxPrice.value = state.maxPrice || "";
      els.head.innerHTML = t("table").map((label) => `<th>${label}</th>`).join("");
      renderSortOptions();
      renderTypeOptions();
      renderAddTypeOptions();
      renderOilTierOptions();
    }

    function renderSortOptions() {
      const current = state.sort;
      els.sort.innerHTML = Object.entries(t("sort")).map(([value, label]) => `<option value="${value}">${label}</option>`).join("");
      els.sort.value = current;
    }

    function renderTypeOptions() {
      const current = state.type;
      els.type.innerHTML = `<option value="all">${t("allTypes")}</option>` + Object.keys(typeLabels).map((key) => `<option value="${key}">${typeName(key)}</option>`).join("");
      els.type.value = current;
    }

    function renderAddTypeOptions() {
      const current = els.addType.value || "naked";
      els.addType.innerHTML = Object.keys(typeLabels).map((key) => `<option value="${key}">${typeName(key)}</option>`).join("");
      els.addType.value = typeLabels[current] ? current : "naked";
    }

    function renderOilTierOptions() {
      const labels = {
        all: t("oilAllTypes"),
        mineral: t("oilMineral"),
        semi: t("oilSemi"),
        fully: t("oilFully"),
        premium: t("oilPremium")
      };
      els.oilTypeFilter.innerHTML = Object.entries(labels).map(([value, label]) => `<option value="${value}">${label}</option>`).join("");
      els.oilTypeFilter.value = state.oilTier;
    }

    function renderLookup() {
      if (!state.lookup.trim()) {
        els.manualSection.classList.add("hidden");
        els.lookupList.innerHTML = `<div class="empty">${t("lookupEmpty")}</div>`;
        return;
      }
      const localMatches = localCatalogMatches();
      if (!localMatches.length) {
        els.manualSection.classList.remove("hidden");
        els.lookupList.innerHTML = `<div class="empty">${t("lookupNoResult")}</div>`;
        return;
      }
      els.manualSection.classList.add("hidden");
      els.lookupList.innerHTML = localMatches.map((bike) => {
        const exists = state.bikes.some((item) => item.brand === bike.brand && item.name === bike.name);
        const detail = prosConsText(bike);
        return `
          <div class="lookup-item">
            <div>
              <strong>${bike.brand} ${bike.name}</strong>
              <span>${typeName(bike.type)} · ${money(bike.price)} · ${bike.cc} cc · ${bike.power} kW · ${t("localSource")}</span>
              <span>${priceStatusText(bike)}</span>
              ${reviewLineMarkup(bike)}
              <span>${t("prosLabel")}: ${detail.pros.join(" / ")}</span>
              <span>${t("consLabel")}: ${detail.cons.join(" / ")}</span>
            </div>
            <button class="${exists ? "ghost-button" : "primary-button"}" type="button" data-local-id="${bike.id}" ${exists ? "disabled" : ""}>${exists ? t("alreadyAdded") : t("addFound")}</button>
          </div>
        `;
      }).join("");
    }

    function renderBikeCards() {
      const bikes = browsableCatalogBikes().slice(0, 6);
      if (!bikes.length) {
        els.bikeCards.innerHTML = `<div class="empty">${t("noResult")}</div>`;
        return;
      }

      els.bikeCards.innerHTML = bikes.map((bike) => {
        const detail = prosConsText(bike);
        const selected = state.selected.has(bike.id);
        return `
          <article class="bike-card">
            <div class="bike-card-top">
              ${photoMarkup(bike)}
              <div class="bike-card-title">
                <strong>${bike.brand} ${bike.name}</strong>
                <span>${typeName(bike.type)} · ${bike.cc} cc</span>
              </div>
            </div>
            <div>
              <div class="bike-price">${money(bike.price)}</div>
              <div class="price-note">${priceStatusText(bike)}</div>
              ${reviewLineMarkup(bike)}
            </div>
            <div class="spec-pills" aria-label="${t("keySpecs")}">
              <div class="spec-pill"><span>${t("powerShort")}</span>${bike.power} kW</div>
              <div class="spec-pill"><span>${t("weightShort")}</span>${bike.weight} kg</div>
              <div class="spec-pill"><span>${t("rangeShort")}</span>${bike.range} km</div>
            </div>
            <div class="pros-cons">
              <span><b>${t("prosLabel")}:</b> ${detail.pros.slice(0, 2).join(" / ")}</span>
              <span><b>${t("consLabel")}:</b> ${detail.cons.slice(0, 2).join(" / ")}</span>
            </div>
            <div class="card-actions">
              <button class="${selected ? "ghost-button" : "primary-button"}" type="button" data-card-toggle="${bike.id}">
                ${selected ? t("removeAction") : t("compareAction")}
              </button>
              <span class="tag">${scoreBike(bike)} ${t("scoreUnit")}</span>
            </div>
          </article>
        `;
      }).join("");
    }

    function getComparePair() {
      const available = compareUniverse();
      if (!state.compareA || !state.compareB || Number(state.compareA) === Number(state.compareB)) return [null, null];
      let bikeA = available.find((bike) => bike.id === Number(state.compareA)) || available[0];
      let bikeB = available.find((bike) => bike.id === Number(state.compareB)) || available.find((bike) => bike.id !== bikeA.id) || bikeA;
      return [bikeA, bikeB];
    }

    function compareUniverse() {
      const map = new Map();
      [...catalogBikes, ...state.bikes].forEach((bike) => {
        map.set(`${bike.brand}::${bike.name}`, bike);
      });
      return [...map.values()];
    }

    function renderComparePickers() {
      renderComparePicker("A");
      renderComparePicker("B");
    }

    function renderComparePicker(side) {
      const brandEl = side === "A" ? els.compareBrandA : els.compareBrandB;
      const searchEl = side === "A" ? els.compareSearchA : els.compareSearchB;
      const resultsEl = side === "A" ? els.compareResultsA : els.compareResultsB;
      const selectedId = side === "A" ? state.compareA : state.compareB;
      const brandValue = side === "A" ? state.compareBrandA : state.compareBrandB;
      const searchValue = side === "A" ? state.compareSearchA : state.compareSearchB;
      const brands = [...new Set(compareUniverse().map((bike) => bike.brand))].sort();
      brandEl.innerHTML = `<option value="all">${t("allBrands")}</option>` + brands.map((brand) => `<option value="${brand}">${brand}</option>`).join("");
      brandEl.value = brandValue;
      searchEl.value = searchValue;
      const term = searchValue.trim().toLowerCase();
      const matches = compareUniverse().filter((bike) => {
        const brandMatch = brandValue === "all" || bike.brand === brandValue;
        const textMatch = !term || `${bike.brand} ${bike.name} ${bike.cc}`.toLowerCase().includes(term);
        return brandMatch && textMatch && withinPriceRange(bike);
      }).slice(0, 8);
      resultsEl.innerHTML = matches.length ? matches.map((bike) => `
        <button class="compare-result ${Number(selectedId) === bike.id ? "active" : ""}" type="button" data-compare-side="${side}" data-compare-id="${bike.id}">
          <strong>${bike.brand} ${bike.name}</strong>
          <span>${money(bike.price)} · ${bike.cc} cc · ${typeName(bike.type)}</span>
        </button>
      `).join("") : `<div class="empty">${t("noResult")}</div>`;
    }

    function renderTwoBikeCompare() {
      renderComparePickers();
      const [bikeA, bikeB] = getComparePair();
      if (!bikeA || !bikeB) {
        els.twoBikeCompare.innerHTML = `<div class="empty">${t("chooseHint")}</div>`;
        return;
      }
      renderComparePickers();
      const detailA = prosConsText(bikeA);
      const detailB = prosConsText(bikeB);
      const rows = [
        [t("priceLabel"), money(bikeA.price), money(bikeB.price)],
        [t("powerLabel"), `${bikeA.power} kW`, `${bikeB.power} kW`],
        [t("torqueLabel"), `${bikeA.torque} N·m`, `${bikeB.torque} N·m`],
        [t("weightLabel"), `${bikeA.weight} kg`, `${bikeB.weight} kg`],
        [t("seatLabel"), `${bikeA.seat} mm`, `${bikeB.seat} mm`],
        [t("tankLabel"), `${bikeA.tank} L`, `${bikeB.tank} L`],
        [t("rangeLabel"), `${bikeA.range} km`, `${bikeB.range} km`],
        [t("electronicsLabel"), bikeA.electronics, bikeB.electronics],
        [t("reviewLabel"), reviewLinkMarkup(bikeA), reviewLinkMarkup(bikeB)],
        [t("prosLabel"), detailA.pros.slice(0, 2).join(" / "), detailB.pros.slice(0, 2).join(" / ")],
        [t("consLabel"), detailA.cons.slice(0, 2).join(" / "), detailB.cons.slice(0, 2).join(" / ")]
      ];

      els.twoBikeCompare.innerHTML = `
        <div class="compare-selectors">
          <div class="compare-device">
            ${photoMarkup(bikeA)}
            <div>
              <h3>${bikeA.brand} ${bikeA.name}</h3>
              <div class="bike-price">${money(bikeA.price)}</div>
              <div class="price-note">${priceStatusText(bikeA)}</div>
              ${reviewLineMarkup(bikeA)}
            </div>
          </div>
          <div class="compare-device">
            ${photoMarkup(bikeB)}
            <div>
              <h3>${bikeB.brand} ${bikeB.name}</h3>
              <div class="bike-price">${money(bikeB.price)}</div>
              <div class="price-note">${priceStatusText(bikeB)}</div>
              ${reviewLineMarkup(bikeB)}
            </div>
          </div>
        </div>
        <h2>${t("summaryTitle")}</h2>
        <div class="apple-summary">
          <div class="summary-cell">
            <div class="summary-number">${bikeA.cc}</div>
            <div class="summary-label">${t("displacementLabel")} cc<br>${typeName(bikeA.type)}</div>
          </div>
          <div class="summary-cell">
            <div class="summary-number">${bikeB.cc}</div>
            <div class="summary-label">${t("displacementLabel")} cc<br>${typeName(bikeB.type)}</div>
          </div>
        </div>
        <div class="compare-specs">
          ${rows.map(([label, valueA, valueB]) => `
            <div class="compare-row">
              <div class="compare-row-label">${label}</div>
              <div class="compare-row-value">${valueA}</div>
              <div class="compare-row-value">${valueB}</div>
            </div>
          `).join("")}
        </div>
      `;
    }

    function renderRows() {
      const bikes = filteredBikes();
      const selectedBikes = getSelectedBikes();
      const best = getBestValues(selectedBikes.length ? selectedBikes : bikes);

      els.rows.innerHTML = bikes.map((bike) => {
        const score = scoreBike(bike);
        const detail = prosConsText(bike);
        return `
          <tr>
            <td>
              <label class="check-cell">
                <input type="checkbox" data-id="${bike.id}" ${state.selected.has(bike.id) ? "checked" : ""} />
                ${photoMarkup(bike)}
                <span class="bike-name">
                  <strong>${bike.brand} ${bike.name}</strong>
                  <span>ID ${String(bike.id).padStart(3, "0")} · ${bike.cc} cc</span>
                </span>
              </label>
            </td>
            <td><span class="tag">${typeName(bike.type)}</span></td>
            <td class="${classFor("price", bike.price, best)}">${money(bike.price)}</td>
            <td class="value">${bike.cc} cc</td>
            <td class="${classFor("power", bike.power, best)}">${bike.power} kW</td>
            <td class="${classFor("torque", bike.torque, best)}">${bike.torque} N·m</td>
            <td class="${classFor("weight", bike.weight, best)}">${bike.weight} kg</td>
            <td class="value">${bike.seat} mm</td>
            <td class="value">${bike.tank} L</td>
            <td class="${classFor("range", bike.range, best)}">${bike.range} km</td>
            <td class="value">${bike.electronics}</td>
            <td>
              <div class="pros-cons">
                <span><b>${t("prosLabel")}:</b> ${detail.pros.join(" / ")}</span>
                <span><b>${t("consLabel")}:</b> ${detail.cons.join(" / ")}</span>
              </div>
            </td>
            <td>${reviewLinkMarkup(bike)}</td>
            <td class="${score >= 75 ? "best" : "value"}">${score}</td>
          </tr>
        `;
      }).join("");

      if (!bikes.length) {
        els.rows.innerHTML = `<tr><td colspan="14"><div class="empty">${t("noResult")}</div></td></tr>`;
      }
    }

    function classFor(key, value, best) {
      if (!best[key]) return "value";
      const target = best[key];
      if (Math.abs(value - target.best) < 0.001) return "best";
      if (Math.abs(value - target.low) < 0.001) return "low";
      return "value";
    }

    function getBestValues(bikes) {
      const result = {};
      if (!bikes.length) return result;
      Object.entries(weights).forEach(([key, dir]) => {
        const values = bikes.map((bike) => bike[key]);
        result[key] = {
          best: dir === "lower" ? Math.min(...values) : Math.max(...values),
          low: dir === "lower" ? Math.max(...values) : Math.min(...values)
        };
      });
      return result;
    }

    function getSelectedBikes() {
      return state.bikes.filter((bike) => state.selected.has(bike.id));
    }

    function renderCompareList() {
      const bikes = getSelectedBikes();
      els.compareList.innerHTML = bikes.length ? bikes.map((bike) => `
        <div class="compare-item">
          ${photoMarkup(bike, "compare-thumb")}
          <div>
            <strong>${bike.brand} ${bike.name}</strong>
            <span>${typeName(bike.type)} · ${money(bike.price)} · ${scoreBike(bike)} ${t("scoreUnit")}</span>
          </div>
          <button class="icon-button" type="button" data-remove="${bike.id}" title="${t("clear")}">
            <svg class="icon" viewBox="0 0 24 24"><path d="M18 6 6 18"></path><path d="m6 6 12 12"></path></svg>
          </button>
        </div>
      `).join("") : `<div class="empty">${t("chooseHint")}</div>`;
    }

    function renderStats() {
      els.total.textContent = catalogBikes.length;
      els.shown.textContent = filteredBikes().length;
      els.selected.textContent = state.selected.size;
    }

    function renderOilRecommendations() {
      const budget = Number(state.oilBudget || 0);
      const selected = getSelectedBikes();
      const bikes = selected.length ? selected : filteredBikes().slice(0, 3);
      const averageCc = bikes.length ? bikes.reduce((sum, bike) => sum + bike.cc, 0) / bikes.length : 500;
      const activeTypes = [...new Set(bikes.map((bike) => bike.type))];
      const sourceOils = state.oilTier === "all" ? oilProducts : oilProducts.filter((oil) => oil.tier === state.oilTier);
      const ranked = sourceOils.map((oil) => {
        const withinBudget = !budget || oil.price <= budget;
        const typeFit = oil.fitTypes.some((type) => activeTypes.includes(type));
        const ccFit = averageCc <= oil.maxCc;
        let score = 0;
        score += withinBudget ? 42 : Math.max(0, 24 - (oil.price - budget));
        score += typeFit ? 28 : 8;
        score += ccFit ? 22 : 4;
        score += oil.tier === "premium" ? 10 : oil.tier === "fully" ? 8 : oil.tier === "semi" ? 5 : 2;
        return { oil, withinBudget, typeFit, ccFit, score };
      }).sort((a, b) => b.score - a.score || a.oil.price - b.oil.price).slice(0, 8);

      els.oilBudget.value = budget || "";
      els.oilTypeFilter.value = state.oilTier;
      els.oilList.innerHTML = `
        <p class="oil-reason">${budget ? `${t("oilBudget")}: ${money(budget)}` : t("oilNoBudget")}</p>
        ${ranked.map((item) => {
          const reasons = [];
          if (item.ccFit) reasons.push(t("oilReasonCc"));
          if (item.typeFit) reasons.push(t("oilReasonType"));
          if (item.withinBudget) reasons.push(t("oilReasonBudget"));
          if (budget && !item.withinBudget) reasons.push(t("oilReasonClosest"));
          if (!reasons.length) reasons.push(t("oilReasonValue"));
          return `
            <article class="oil-card">
              <header>
                <strong>${item.oil.name}</strong>
                <span class="oil-price">${money(item.oil.price)}</span>
              </header>
              <div class="oil-meta">
                <span class="tag">${item.oil.grade}</span>
                <span class="tag">${item.oil.type}</span>
                <span class="tag">${item.withinBudget || !budget ? t("oilWithin") : t("oilOver")}</span>
              </div>
              <p class="oil-reason">${reasons.join(" · ")}</p>
            </article>
          `;
        }).join("")}
      `;
    }

    function render() {
      applyLanguage();
      renderLookup();
      renderBikeCards();
      renderTwoBikeCompare();
      renderRows();
      renderCompareList();
      renderStats();
      renderOilRecommendations();
    }

    function showToast(message) {
      els.toast.textContent = message;
      els.toast.classList.add("show");
      clearTimeout(showToast.timer);
      showToast.timer = setTimeout(() => els.toast.classList.remove("show"), 1800);
    }

    function saveUserBikes() {
      const saved = state.bikes.filter((bike) => bike.userAdded || bike.catalogUserAdded || bike.onlineAdded);
      localStorage.setItem("motorcycleCompareUserBikes", JSON.stringify(saved));
    }

    function addLocalCatalogBike(id) {
      const bike = catalogBikes.find((item) => item.id === id);
      if (!bike) return;
      const exists = state.bikes.find((item) => item.brand === bike.brand && item.name === bike.name);
      if (exists) {
        state.selected.add(exists.id);
        render();
        showToast(t("alreadyAdded"));
        return;
      }
      const newBike = { ...bike, id: bike.id, catalogUserAdded: true };
      state.bikes.push(newBike);
      state.selected.add(newBike.id);
      saveUserBikes();
      render();
      showToast(t("addedFromLookup"));
    }

    function nextId() {
      return Math.max(0, ...state.bikes.map((item) => item.id)) + 1;
    }

    function downloadCsv() {
      const rows = getSelectedBikes();
      const exportRows = rows.length ? rows : filteredBikes();
      const header = state.lang === "zh"
        ? ["品牌", "车型", "类型", "价格RM", "排量cc", "功率kW", "扭矩Nm", "质量kg", "座高mm", "油箱L", "续航km", "电控", "优点", "缺点", "评价数量", "评价链接", "评分", "照片"]
        : ["Brand", "Model", "Type", "Price RM", "CC", "Power kW", "Torque Nm", "Weight kg", "Seat mm", "Tank L", "Range km", "Electronics", "Pros", "Cons", "Review count", "Review URL", "Score", "Photo"];
      const body = exportRows.map((bike) => {
        const detail = prosConsText(bike);
        return [
          bike.brand, bike.name, typeName(bike.type), bike.price, bike.cc, bike.power, bike.torque,
          bike.weight, bike.seat, bike.tank, bike.range, bike.electronics,
          detail.pros.join(" / "), detail.cons.join(" / "), bike.reviewCount || 0, bike.reviewUrl || "", scoreBike(bike), bike.photo || ""
        ];
      });
      const csv = [header, ...body].map((row) => row.map((cell) => `"${String(cell).replaceAll('"', '""')}"`).join(",")).join("\n");
      const blob = new Blob(["\uFEFF" + csv], { type: "text/csv;charset=utf-8" });
      const url = URL.createObjectURL(blob);
      const link = document.createElement("a");
      link.href = url;
      link.download = "motorcycle-compare-rm.csv";
      link.click();
      URL.revokeObjectURL(url);
      showToast(t("exported"));
    }

    function readPhotoFile(file) {
      return new Promise((resolve) => {
        if (!file) return resolve("");
        const reader = new FileReader();
        reader.onload = () => resolve(reader.result);
        reader.onerror = () => resolve("");
        reader.readAsDataURL(file);
      });
    }

    els.lookupInput.addEventListener("input", (event) => {
      state.lookup = event.target.value;
      renderLookup();
    });

    els.lookupList.addEventListener("click", (event) => {
      const localButton = event.target.closest("[data-local-id]");
      if (localButton) addLocalCatalogBike(Number(localButton.dataset.localId));
    });

    els.type.addEventListener("change", (event) => {
      state.type = event.target.value;
      render();
    });

    els.sort.addEventListener("change", (event) => {
      state.sort = event.target.value;
      render();
    });

    els.minPrice.addEventListener("input", (event) => {
      state.minPrice = Number(event.target.value || 0);
      localStorage.setItem("motorcycleCompareMinPrice", String(state.minPrice || ""));
      render();
    });

    els.maxPrice.addEventListener("input", (event) => {
      state.maxPrice = Number(event.target.value || 0);
      localStorage.setItem("motorcycleCompareMaxPrice", String(state.maxPrice || ""));
      render();
    });

    els.lang.addEventListener("change", (event) => {
      state.lang = event.target.value;
      localStorage.setItem("motorcycleCompareLang", state.lang);
      render();
    });

    els.oilBudget.addEventListener("input", (event) => {
      state.oilBudget = Number(event.target.value || 0);
      localStorage.setItem("motorcycleCompareOilBudget", String(state.oilBudget || ""));
      renderOilRecommendations();
    });

    els.oilTypeFilter.addEventListener("change", (event) => {
      state.oilTier = event.target.value;
      localStorage.setItem("motorcycleCompareOilTier", state.oilTier);
      renderOilRecommendations();
    });

    els.compareBrandA.addEventListener("change", (event) => {
      state.compareBrandA = event.target.value;
      renderTwoBikeCompare();
    });

    els.compareBrandB.addEventListener("change", (event) => {
      state.compareBrandB = event.target.value;
      renderTwoBikeCompare();
    });

    els.compareSearchA.addEventListener("input", (event) => {
      state.compareSearchA = event.target.value;
      renderTwoBikeCompare();
    });

    els.compareSearchB.addEventListener("input", (event) => {
      state.compareSearchB = event.target.value;
      renderTwoBikeCompare();
    });

    [els.compareResultsA, els.compareResultsB].forEach((panel) => {
      panel.addEventListener("click", (event) => {
        const button = event.target.closest("[data-compare-id]");
        if (!button) return;
        const id = Number(button.dataset.compareId);
        if (button.dataset.compareSide === "A") state.compareA = id;
        if (button.dataset.compareSide === "B") state.compareB = id;
        renderTwoBikeCompare();
      });
    });

    els.rows.addEventListener("change", (event) => {
      const id = Number(event.target.dataset.id);
      if (!id) return;
      event.target.checked ? state.selected.add(id) : state.selected.delete(id);
      render();
    });

    els.bikeCards.addEventListener("click", (event) => {
      const button = event.target.closest("[data-card-toggle]");
      if (!button) return;
      const id = Number(button.dataset.cardToggle);
      const existsInList = state.bikes.some((bike) => bike.id === id);
      if (!existsInList) {
        addLocalCatalogBike(id);
        return;
      }
      state.selected.has(id) ? state.selected.delete(id) : state.selected.add(id);
      render();
    });

    els.compareList.addEventListener("click", (event) => {
      const button = event.target.closest("[data-remove]");
      if (!button) return;
      state.selected.delete(Number(button.dataset.remove));
      render();
    });

    els.clear.addEventListener("click", () => {
      state.selected.clear();
      render();
    });

    els.reset.addEventListener("click", () => {
      localStorage.removeItem("motorcycleCompareUserBikes");
      localStorage.removeItem("motorcycleCompareOilBudget");
      localStorage.removeItem("motorcycleCompareOilTier");
      localStorage.removeItem("motorcycleCompareMinPrice");
      localStorage.removeItem("motorcycleCompareMaxPrice");
      state.bikes = [...defaultBikes.map((bike) => ({ ...bike }))];
      state.selected = new Set();
      state.lookup = "";
      state.type = "all";
      state.sort = "score-desc";
      state.minPrice = 0;
      state.maxPrice = 0;
      state.compareA = null;
      state.compareB = null;
      state.compareBrandA = "all";
      state.compareBrandB = "all";
      state.compareSearchA = "";
      state.compareSearchB = "";
      state.photoData = "";
      state.oilBudget = 0;
      state.oilTier = "all";
      els.lookupInput.value = "";
      els.minPrice.value = "";
      els.maxPrice.value = "";
      els.compareSearchA.value = "";
      els.compareSearchB.value = "";
      els.photoPreview.style.display = "none";
      render();
      showToast(t("resetDone"));
    });

    els.export.addEventListener("click", downloadCsv);

    els.photoFile.addEventListener("change", async (event) => {
      state.photoData = await readPhotoFile(event.target.files[0]);
      if (state.photoData) {
        els.photoPreview.src = state.photoData;
        els.photoPreview.style.display = "block";
      }
    });

    els.addForm.addEventListener("submit", async (event) => {
      event.preventDefault();
      const data = new FormData(event.currentTarget);
      const photoFileData = state.photoData || await readPhotoFile(event.currentTarget.elements.photoFile.files[0]);
      const photoUrl = data.get("photoUrl").trim();
      const bike = {
        id: nextId(),
        userAdded: true,
        name: data.get("name").trim(),
        brand: data.get("brand").trim(),
        type: data.get("type"),
        price: Number(data.get("price")),
        cc: Number(data.get("cc")),
        power: Number(data.get("power")),
        torque: Number(data.get("torque")),
        weight: Number(data.get("weight")),
        seat: Number(data.get("seat")),
        tank: Number(data.get("tank")),
        range: Number(data.get("range")),
        electronics: data.get("electronics").trim() || "ABS",
        photo: photoFileData || photoUrl
      };
      state.bikes.push({ ...bike, ...buildProsCons(bike) });
      state.selected.add(bike.id);
      saveUserBikes();
      event.currentTarget.reset();
      event.currentTarget.elements.electronics.value = "ABS / TCS";
      state.photoData = "";
      els.photoPreview.style.display = "none";
      render();
      showToast(t("added"));
    });

    render();
  </script>
</body>
</html>
